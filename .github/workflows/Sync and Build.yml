name: Sync and Build

on:
  schedule:
    - cron: '0 2 * * *' # 每天凌晨2点运行
  push:
    branches:
      - master

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Sync with upstream
        uses: TobKed/github-forks-sync-action@v0.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_repository: felixonmars/dnsmasq-china-list
          target_repository: InsulateJustf/dnsmasq-china-list
          upstream_branch: master
          target_branch: master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          

      - name: Run make
        run: make SERVER=domestic SMARTDNS_SPEEDTEST_MODE=tcp:80 smartdns-domain-rules

      - name: Commit and push changes
        uses: actions-js/push@v1.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "Auto build and push on $(date +'%Y-%m-%d %H:%M:%S')"
          branch: master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
