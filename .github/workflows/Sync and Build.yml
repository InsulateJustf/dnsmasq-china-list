name: Sync and Build

on:
  schedule:
    - cron: '0 2 * * *' # 每天凌晨2点运行
  push:
    branches:
      - master

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      - name: Upstream Sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_sync_branch: master
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_repo_access_token: # optional
          upstream_sync_repo: felixonmars/dnsmasq-china-list
          upstream_sync_branch: master
          

      - name: Run make
        run: make SERVER=domestic SMARTDNS_SPEEDTEST_MODE=tcp:80 smartdns-domain-rules

      - name: Commit and push changes
        uses: actions-js/push@v1.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "Auto build and push on $(date +'%Y-%m-%d %H:%M:%S')"
          branch: master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
